name: planeats
description: App per organizzare pasti settimanali e lista della spesa.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.4
  uuid: ^4.5.1
  fl_chart: ^1.2.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  google_generative_ai: ^0.4.7
  http: ^1.2.2
  flutter_markdown: ^0.7.4
  flutter_image_compress: ^2.3.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  font_awesome_flutter: ^10.7.0
  shared_preferences: ^2.2.2
  sqflite: ^2.4.2
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true